[pytest]
testpaths = tests
pythonpath = .
# pytest-playwright wraps every test in a soft-assertion scope. Our behavioural
# tests run nested pytest sessions via `pytester` (in-process), which would make
# those scopes nest and error out. We don't use pytest-playwright here (only the
# playwright exception types are imported), so disable the plugin for this suite.
addopts = -p no:playwright
