[pytest]
testpaths = tests
pythonpath = .
# Our behavioural tests run nested pytest sessions via `pytester` (in-process).
# Plugins that wrap each test in a soft-assertion scope (pytest-playwright,
# pytest-check) would nest across the outer/inner sessions and error out. We
# don't use them in the *outer* session, so disable them here. They stay enabled
# inside the nested sessions (see tests/conftest.py) where regression tests for
# the pytest-check interaction need them.
addopts = -p no:playwright -p no:check
